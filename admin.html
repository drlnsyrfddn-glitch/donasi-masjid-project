<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Donasi Masjid</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script> </head>
<body class="bg-gray-50 font-sans">

    <div id="login-section" class="min-h-screen flex items-center justify-center px-4">
        <div class="max-w-md w-full bg-white p-8 rounded-2xl shadow-sm border border-gray-100 text-center">
            <div class="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl">
                <i class="fas fa-lock"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Login Admin</h2>
            <div class="mb-4 text-left">
                <input type="password" id="password-input" placeholder="Masukkan Password" 
                       class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-green-500">
                <p id="login-error" class="text-red-500 text-xs mt-2 hidden">Password salah!</p>
            </div>
            <button onclick="checkLogin()" class="w-full bg-green-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-green-700 transition shadow-sm">Masuk Dashboard</button>
        </div>
    </div>

    <div id="dashboard-section" class="hidden max-w-6xl mx-auto p-4 md:p-8">
        <header class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">Dashboard Infaq</h1>
                <p class="text-gray-500 text-sm">Masjid Al-Ikhlas</p>
            </div>
            <div class="flex gap-3">
                <button onclick="fetchData()" class="bg-blue-600 text-white px-5 py-2 rounded-lg text-sm font-semibold hover:bg-blue-700 shadow-sm"><i class="fas fa-sync-alt mr-2"></i> Refresh</button>
                <button onclick="logout()" class="bg-red-50 text-red-600 px-5 py-2 rounded-lg text-sm font-semibold hover:bg-red-100 border border-red-100"><i class="fas fa-sign-out-alt mr-2"></i> Keluar</button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex items-center justify-between">
                <div>
                    <p class="text-gray-400 text-sm font-medium mb-1">Total Dana Lunas</p>
                    <h2 id="total-dana" class="text-2xl font-bold text-green-600">Rp 0</h2>
                </div>
                <div class="bg-green-50 p-4 rounded-full"><i class="fas fa-wallet text-green-500 text-xl"></i></div>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex items-center justify-between">
                <div>
                    <p class="text-gray-400 text-sm font-medium mb-1">Total Donatur Lunas</p>
                    <h2 id="total-donatur" class="text-2xl font-bold text-gray-800">0</h2>
                </div>
                <div class="bg-blue-50 p-4 rounded-full"><i class="fas fa-users text-blue-500 text-xl"></i></div>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <div class="flex justify-between items-start mb-2">
                    <p class="text-gray-400 text-sm font-medium">Target Pencapaian</p>
                    <button onclick="ubahTarget()" class="text-xs text-blue-600 bg-blue-50 px-2 py-1 rounded hover:bg-blue-100"><i class="fas fa-edit"></i> Ubah</button>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-2.5 mb-2 mt-3">
                    <div id="progress-bar" class="bg-yellow-400 h-2.5 rounded-full" style="width: 0%"></div>
                </div>
                <div class="flex justify-between text-xs font-semibold text-gray-500">
                    <span id="persentase-target">0%</span>
                    <span id="teks-target">Target: Rp 0</span>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="p-5 border-b border-gray-100 bg-white flex justify-between items-center">
                <h3 class="font-bold text-gray-800">Riwayat Transaksi</h3>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm whitespace-nowrap">
                    <thead class="bg-gray-50 text-gray-500 uppercase text-[11px] font-bold">
                        <tr>
                            <th class="px-6 py-4">Waktu</th>
                            <th class="px-6 py-4">Order ID</th>
                            <th class="px-6 py-4">Nama</th>
                            <th class="px-6 py-4">Nominal</th>
                            <th class="px-6 py-4">Status</th>
                        </tr>
                    </thead>
                    <tbody id="tabel-data" class="divide-y divide-gray-100">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
       const URL_GAS = 'https://script.google.com/macros/s/AKfycbwEpbAmVI8SYZKLlGDNPsJp1CxYn3K8VTX_4g19VXh3qPswi94lNHITJLAckqkA_Ar4vw/exec'; 
        const PASSWORD_ADMIN = 'admin123'; 
        const formatRupiah = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 });

        document.getElementById("password-input").addEventListener("keypress", function(event) {
            if (event.key === "Enter") checkLogin();
        });

        function checkLogin() {
            if (document.getElementById('password-input').value === PASSWORD_ADMIN) {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('dashboard-section').classList.remove('hidden');
                fetchData();
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }

        function logout() { location.reload(); }

        function fetchData() {
            const tabel = document.getElementById('tabel-data');
            tabel.innerHTML = `<tr><td colspan="5" class="px-6 py-10 text-center"><i class="fas fa-spinner fa-spin mr-2"></i> Memuat data...</td></tr>`;

            fetch(URL_GAS + '?action=admin')
            .then(res => res.json())
            .then(data => {
                document.getElementById('total-dana').innerText = formatRupiah.format(data.total_terkumpul);
                document.getElementById('total-donatur').innerText = data.jumlah_donatur;
                
                // --- Kalkulasi Progress Bar Target ---
                document.getElementById('teks-target').innerText = `Target: ${formatRupiah.format(data.target_donasi)}`;
                let persentase = (data.total_terkumpul / data.target_donasi) * 100;
                if(persentase > 100) persentase = 100; // Maksimal bar 100%
                document.getElementById('progress-bar').style.width = persentase + '%';
                document.getElementById('persentase-target').innerText = persentase.toFixed(1) + '%';

                tabel.innerHTML = '';
                const semuaData = data.semua_data.reverse();
                semuaData.forEach(item => {
                    let statusColor = item.status === 'Berhasil' || item.status === 'Settlement' ? 'bg-green-100 text-green-700' : 
                                      item.status === 'Pending' ? 'bg-yellow-100 text-yellow-700' : 'bg-red-100 text-red-700';
                    tabel.innerHTML += `
                        <tr class="hover:bg-gray-50 border-b border-gray-50">
                            <td class="px-6 py-4 text-gray-500 text-xs">${item.waktu}</td>
                            <td class="px-6 py-4 text-gray-400 text-xs font-mono">${item.orderId}</td>
                            <td class="px-6 py-4 font-bold text-gray-700">${item.nama}</td>
                            <td class="px-6 py-4 font-semibold">${formatRupiah.format(item.nominal)}</td>
                            <td class="px-6 py-4"><span class="px-3 py-1 rounded-full text-[10px] font-bold ${statusColor}">${item.status}</span></td>
                        </tr>
                    `;
                });
            });
        }

        // --- Fungsi Ubah Target Menggunakan SweetAlert ---
        function ubahTarget() {
            Swal.fire({
                title: 'Ubah Target Donasi',
                text: "Masukkan nominal target baru (hanya angka, tanpa titik):",
                input: 'number',
                showCancelButton: true,
                confirmButtonText: 'Simpan',
                cancelButtonText: 'Batal',
                inputValidator: (value) => {
                    if (!value || value <= 0) {
                        return 'Masukkan nominal yang valid!'
                    }
                }
            }).then((result) => {
                if (result.isConfirmed) {
                    Swal.fire({title: 'Menyimpan...', allowOutsideClick: false, didOpen: () => {Swal.showLoading()}});
                    
                    fetch(URL_GAS, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'update_target', target_baru: parseInt(result.value) })
                    })
                    .then(res => res.json())
                    .then(data => {
                        if(data.status === 'success') {
                            Swal.fire('Berhasil!', 'Target donasi telah diperbarui.', 'success');
                            fetchData(); // Refresh UI
                        }
                    })
                    .catch(() => Swal.fire('Error', 'Gagal menyimpan target', 'error'));
                }
            });
        }
    </script>
</body>
</html>
