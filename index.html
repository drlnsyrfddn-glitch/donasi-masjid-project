<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infaq Digital - Masjid Al-Ikhlas Morowali</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://app.sandbox.midtrans.com/snap/snap.js" data-client-key="MASUKKAN_CLIENT_KEY_SANDBOX_KAMU_DISINI"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-800">

    <header class="bg-white shadow-sm border-b border-gray-100 py-6">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <h1 class="text-3xl font-bold text-green-700 mb-2"><i class="fas fa-mosque mr-2"></i> Masjid Al-Ikhlas</h1>
            <p class="text-gray-500">Bungku Barat, Kab. Morowali, Sulawesi Tengah</p>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-8">
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 mb-8 text-center">
            <h2 class="text-lg font-semibold text-gray-700 mb-4">Progress Pembangunan Plafon</h2>
            <div class="flex justify-between items-end mb-2">
                <div class="text-left">
                    <p class="text-xs text-gray-400 font-medium">Terkumpul</p>
                    <p id="total-terkumpul" class="text-2xl font-bold text-green-600">Rp 0</p>
                </div>
                <div class="text-right">
                    <p class="text-xs text-gray-400 font-medium">Target</p>
                    <p id="target-donasi" class="text-sm font-bold text-gray-500">Rp 0</p>
                </div>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-3 mb-2">
                <div id="progress-bar" class="bg-green-500 h-3 rounded-full transition-all duration-1000" style="width: 0%"></div>
            </div>
            <p class="text-sm text-gray-500"><span id="jumlah-donatur" class="font-bold text-gray-700">0</span> orang telah berdonasi</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h3 class="text-xl font-bold text-gray-800 mb-4 border-b pb-2">Kirim Infaq</h3>
                <form id="form-donasi" onsubmit="bayar(event)">
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Nominal Donasi (Rp)</label>
                        <input type="number" id="nominal" required min="10000" placeholder="Minimal 10.000" 
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none">
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Nama Lengkap</label>
                        <input type="text" id="nama" required placeholder="Nama Anda (Bisa 'Hamba Allah')" 
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none">
                    </div>
                    <div class="mb-6">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Doa / Pesan (Opsional)</label>
                        <textarea id="doa" rows="3" placeholder="Tuliskan doa atau harapan Anda..." 
                                  class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none"></textarea>
                    </div>
                    <button type="submit" id="btn-bayar" class="w-full bg-green-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-green-700 transition shadow-sm flex justify-center items-center">
                        <i class="fas fa-lock mr-2"></i> Lanjutkan Pembayaran
                    </button>
                </form>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col max-h-[500px]">
                <h3 class="text-xl font-bold text-gray-800 mb-4 border-b pb-2">Doa Orang Baik</h3>
                <div id="list-doa" class="overflow-y-auto pr-2 space-y-4">
                    <div class="text-center py-8 text-gray-400 text-sm italic">
                        <i class="fas fa-spinner fa-spin mb-2 text-xl"></i><br>Memuat doa...
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-white border-t border-gray-200 mt-12 py-6 text-center text-sm text-gray-500">
        <p>&copy; 2026 Masjid Al-Ikhlas Morowali. Dikelola dengan aman & transparan.</p>
    </footer>

    <script>
        // ==========================================
        // KONFIGURASI UTAMA
        // ==========================================
        const URL_GAS = 'MASUKKAN_URL_WEB_APP_KAMU_DISINI'; 
        
        const formatRupiah = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 });

        // Load Data saat halaman dibuka
        window.onload = function() {
            fetch(URL_GAS) // Memanggil tanpa action=admin (khusus publik)
            .then(res => res.json())
            .then(data => {
                // 1. Update Statistik & Progress
                document.getElementById('total-terkumpul').innerText = formatRupiah.format(data.total_terkumpul);
                document.getElementById('target-donasi').innerText = formatRupiah.format(data.target_donasi);
                document.getElementById('jumlah-donatur').innerText = data.jumlah_donatur;

                let persentase = (data.total_terkumpul / data.target_donasi) * 100;
                if(persentase > 100) persentase = 100;
                document.getElementById('progress-bar').style.width = persentase + '%';

                // 2. Tampilkan Daftar Doa (Hanya yang lunas)
                const listDoa = document.getElementById('list-doa');
                listDoa.innerHTML = '';
                
                if(data.doa.length === 0) {
                    listDoa.innerHTML = '<p class="text-center text-gray-400 text-sm py-4">Belum ada doa. Jadilah yang pertama!</p>';
                } else {
                    // Balik array agar doa terbaru di atas
                    data.doa.reverse().forEach(item => {
                        listDoa.innerHTML += `
                            <div class="bg-green-50 p-4 rounded-xl border border-green-100">
                                <div class="flex justify-between items-start mb-1">
                                    <h4 class="font-bold text-gray-800 text-sm">${item.nama}</h4>
                                    <span class="text-[10px] text-gray-400">${item.waktu.split(',')[0]}</span>
                                </div>
                                <p class="text-gray-600 text-sm italic">"${item.doa}"</p>
                            </div>
                        `;
                    });
                }
            })
            .catch(err => console.error("Gagal memuat data:", err));
        };

        // Fungsi Tombol Bayar
        function bayar(event) {
            event.preventDefault(); // Mencegah reload halaman
            
            const btn = document.getElementById('btn-bayar');
            const teksAwal = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Memproses...';
            btn.disabled = true;

            const payload = {
                nominal: document.getElementById('nominal').value,
                nama: document.getElementById('nama').value,
                doa: document.getElementById('doa').value
            };

            // Kirim data ke Apps Script untuk generate Token Midtrans
            fetch(URL_GAS, {
                method: 'POST',
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(data => {
                btn.innerHTML = teksAwal;
                btn.disabled = false;

                if(data.token) {
                    // Munculkan Pop-up Midtrans
                    window.snap.pay(data.token, {
                        onSuccess: function(result){
                            alert("Alhamdulillah, pembayaran berhasil!");
                            location.reload();
                        },
                        onPending: function(result){
                            alert("Menunggu pembayaran Anda.");
                            location.reload();
                        },
                        onError: function(result){
                            alert("Pembayaran gagal!");
                            btn.disabled = false;
                        },
                        onClose: function(){
                            alert('Anda menutup halaman sebelum menyelesaikan pembayaran.');
                            btn.disabled = false;
                        }
                    });
                } else {
                    alert("Terjadi kesalahan sistem. Silakan coba lagi.");
                }
            })
            .catch(err => {
                alert("Gagal terhubung ke server.");
                btn.innerHTML = teksAwal;
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
